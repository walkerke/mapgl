name: save-map-cross-platform

on:
  push:
    paths:
      - "R/screenshot.R"
      - "inst/htmlwidgets/screenshot.js"
      - "tools/check-save-map-integration.R"
      - ".github/workflows/save-map-cross-platform.yml"
      - "DESCRIPTION"
  pull_request:
    paths:
      - "R/screenshot.R"
      - "inst/htmlwidgets/screenshot.js"
      - "tools/check-save-map-integration.R"
      - ".github/workflows/save-map-cross-platform.yml"
      - "DESCRIPTION"
  workflow_dispatch:

jobs:
  save-map:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install Linux System Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Export Chrome Path
        shell: bash
        run: |
          echo "CHROMOTE_CHROME=${{ steps.chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"

      - name: Install R Dependencies
        shell: bash
        run: |
          Rscript -e 'install.packages("pak", repos = "https://cloud.r-project.org")'
          Rscript -e 'pak::pak(c("local::.", "chromote"))'

      - name: Run save_map Integration Checks
        shell: bash
        env:
          MAPGL_RUN_REMOTE_SMOKE: ${{ runner.os == 'Linux' && 'true' || 'false' }}
        run: |
          Rscript tools/check-save-map-integration.R
