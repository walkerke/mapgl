name: save-map-cross-platform

on:
  push:
    paths:
      - "R/screenshot.R"
      - "inst/htmlwidgets/screenshot.js"
      - "tools/check-save-map-integration.R"
      - ".github/workflows/save-map-cross-platform.yml"
      - "DESCRIPTION"
  pull_request:
    paths:
      - "R/screenshot.R"
      - "inst/htmlwidgets/screenshot.js"
      - "tools/check-save-map-integration.R"
      - ".github/workflows/save-map-cross-platform.yml"
      - "DESCRIPTION"
  workflow_dispatch:

jobs:
  save-map:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install Linux System Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Setup Chrome
        if: runner.os != 'Windows'
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Export Chrome Path
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "CHROMOTE_CHROME=${{ steps.chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"

      - name: Detect Windows Browser
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            "$Env:ProgramFiles\Google\Chrome\Application\chrome.exe",
            "${Env:ProgramFiles(x86)}\Google\Chrome\Application\chrome.exe",
            "$Env:ProgramFiles\Microsoft\Edge\Application\msedge.exe",
            "${Env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe"
          )

          foreach ($path in $candidates) {
            if (Test-Path $path) {
              "CHROMOTE_CHROME=$path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              Write-Host "Using browser: $path"
              exit 0
            }
          }

          throw "No suitable Windows browser found for CHROMOTE_CHROME"

      - name: Report Browser
        shell: bash
        run: |
          echo "CHROMOTE_CHROME=$CHROMOTE_CHROME"
          "$CHROMOTE_CHROME" --version

      - name: Install R Dependencies
        shell: bash
        run: |
          Rscript -e 'install.packages("pak", repos = "https://cloud.r-project.org")'
          Rscript -e 'pak::pak(c("local::.", "chromote"))'

      - name: Run save_map Integration Checks
        shell: bash
        env:
          MAPGL_RUN_REMOTE_SMOKE: ${{ runner.os == 'Linux' && 'true' || 'false' }}
        run: |
          Rscript tools/check-save-map-integration.R
